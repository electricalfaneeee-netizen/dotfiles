general {
    hide_cursor = true

    ignore_empty_input = true
}

animations {
    enabled = true

    bezier = easeOutQuart,0.165,0.84,0.44,1
    bezier = easeOutQuick,0.15,0,0.1,1
    bezier = easeInQuart,0.895,0.03,0.685,0.22
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0

    animation = global, 1, 10, default
    animation = fade, 1, 3.03, easeOutQuick
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = inputFieldColors, 1, 4.1, easeOutQuart
    animation = inputFieldFade, 1, 3, almostLinear
    animation = inputFieldWidth, 1, 4, easeInOutCubic
    animation = inputFieldDots, 1, 4.1, easeOutQuart
}

input-field {
    monitor = DP-1
    size = 30%, 5%
    outline_thickness = 0
    font_family = Noto Sans
    inner_color = rgba(74,90,79,0.5) 
    font_color = rgba(255,255,255,1)
    placeholder_text = 

    dots_size = 0.8
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1
    dots_text_format =

    fade_timeout = 1400

    check_color = rgba(255,230,105,1)
    fail_color = rgba(255, 0, 55, 1)
    fail_text = Access Denied

    position = -1100, -700
}

background {
    monitor = 
    path = ~/Wallpapers/sage_lockscreen.jpeg
    color = rgba(0,0,0,1)
    blur_size = 0
    blur_passes = 0
}

label {
    monitor =
    text = $TIME12
    color = rgba(255,255,255,1)
    font_size = 150
    font_family = Noto Sans

    position = -1100, -100
}

label {
    monitor = 
    text = cmd[update:60000] date '+%A %B %d %Y'
    color = rgba(255,255,255,1)
    font_size = 50
    font_family = Noto Sans

    position = -1100, -300
}